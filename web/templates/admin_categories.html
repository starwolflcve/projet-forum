{{ define "admin_categories.html" }}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{{ .Title }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        h1 {
            margin-bottom: 24px;
        }

        form {
            margin-bottom: 20px;
        }

        input[type="text"] {
            padding: 10px;
            width: 70%;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        button {
            padding: 10px 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .create-btn {
            background: #2e7d32;
            color: white;
        }

        .delete-btn {
            background: #c62828;
            color: white;
        }

        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            background: #fafafa;
            margin-bottom: 12px;
        }

        .empty {
            color: #777;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ .Title }}</h1>

        <form action="/admin/categories/create" method="POST">
            <input type="text" name="name" placeholder="Nom de la catégorie" required>
            <button type="submit" class="create-btn">Créer</button>
        </form>

        {{ if .Categories }}
            {{ range .Categories }}
                <div class="category-item">
                    <span>{{ .Name }}</span>
                    <form action="/admin/categories/delete" method="POST" style="margin:0;">
                        <input type="hidden" name="category_id" value="{{ .ID }}">
                        <button type="submit" class="delete-btn">Supprimer</button>
                    </form>
                </div>
            {{ end }}
        {{ else }}
            <p class="empty">Aucune catégorie disponible.</p>
        {{ end }}
    </div>
</body>
</html>
{{ end }}
